<!-- 🔥 MODAL -->
<div id="modalConductor" class="modal">
    <div class="modal-content">

        <span onclick="closeConductorModal()" class="close-btn">✖</span>

        <h3>Crear Nuevo Conductor</h3>

        <div class="form-grid">

            <div>
                <label>Nombre</label>
                <input type="text">
            </div>

            <div>
                <label>Email</label>
                <input type="email">
            </div>

            <div>
                <label>Contraseña</label>
                <input type="password">
            </div>

            <div>
                <label>Teléfono</label>
                <input type="text">
            </div>

            <div>
                <label>Vehículo</label>
                <input type="text">
            </div>

            <div>
                <label>Licencia</label>
                <input type="text">
            </div>

        </div>

        <div class="modal-buttons">
            <button class="btn-cancel" onclick="closeConductorModal()">Cancelar</button>
            <button class="btn-danger">Crear</button>
        </div>

    </div>
</div>


<script>
function openConductorModal() {
    document.getElementById('modalConductor').style.display = 'flex';
}

function closeConductorModal() {
    document.getElementById('modalConductor').style.display = 'none';
}
</script>
