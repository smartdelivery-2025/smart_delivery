{% extends 'base.html' %}

{% block content %}

<style>
    .cards {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 20px;
    }

    .card {
        background: rgba(255, 255, 255, 0.1);
        padding: 20px;
        border-radius: 15px;
    }

    .number {
        font-size: 28px;
        font-weight: bold;
    }

    .panel {
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(12px);
        border-radius: 18px;
        padding: 25px;
        margin-top: 20px;
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
    }

    .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
    }

    .box {
        padding: 20px;
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.1);
    }

    .success {
        background: rgba(0, 255, 150, 0.2);
    }

    .danger {
        background: rgba(255, 80, 80, 0.2);
    }

    .charts {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        margin-top: 30px;
    }

    .chart-box {
        background: rgba(255, 255, 255, 0.1);
        padding: 20px;
        border-radius: 15px;
    }

    .kpi {
        background: rgba(255, 255, 255, 0.2);
        padding: 10px;
        border-radius: 10px;
        margin: 10px 0;
    }

    table {
        width: 100%;
        margin-top: 20px;
        border-collapse: collapse;
    }

    td,
    th {
        padding: 10px;
    }

    body {
        min-height: 100vh;
        background: linear-gradient(135deg, #1e3c72, #2a5298, #3b82f6);
        color: white;
    }

    .topbar {
        display: flex;
        justify-content: space-between;
        padding: 20px 40px;
        background: linear-gradient(90deg, #3b3f9c, #7b2ff7);
    }

    .menu {
        display: flex;
        gap: 10px;
        padding: 20px 40px;
    }

    .menu a {
        padding: 10px 20px;
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.1);
        cursor: pointer;
    }

    .menu a:hover {
        background: linear-gradient(135deg, #7b2ff7, #00c6ff);
    }

    #content-area {
        padding: 30px;
    }

    .topbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 15px 40px;
        background: linear-gradient(90deg, #3b3f9c, #7b2ff7, #00c6ff);
        border-radius: 10px;
    }

    .left {
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .left strong {
        font-size: 18px;
    }

    .left small {
        opacity: 0.7;
    }

    .right {
        display: flex;
        align-items: center;
        gap: 20px;
    }

    .user-info {
        text-align: right;
        font-size: 14px;
    }

    .user-info small {
        opacity: 0.7;
    }

    .btn-logout {
        padding: 8px 15px;
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.15);
        color: white;
        text-decoration: none;
        font-size: 14px;
        transition: 0.3s;
    }

    .btn-logout:hover {
        background: linear-gradient(135deg, #7b2ff7, #00c6ff);
    }

    .modal {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.6);
        justify-content: center;
        align-items: center;
        z-index: 1000;
    }

    .modal-content {
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(12px);
        padding: 25px;
        border-radius: 18px;
        width: 400px;
        color: white;
    }

    .modal-content input {
        width: 100%;
        padding: 10px;
        margin-top: 10px;
        border-radius: 10px;
        border: none;
        background: rgba(255, 255, 255, 0.08);
        color: white;
    }

    /* GRID */
    .grid-2 {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
    }

    /* BOTONES MODAL */
    .modal-buttons {
        display: flex;
        justify-content: flex-end;
        gap: 10px;
        margin-top: 15px;
    }

    .btn-cancel {
        background: #444;
        border: none;
        padding: 8px 14px;
        border-radius: 10px;
        color: white;
    }

    

    .modal-content input,
    .modal-content select {
        width: 100%;
        margin: 10px 0;
        padding: 12px;
        border-radius: 12px;
        border: none;
        outline: none;
        background: rgba(255, 255, 255, 0.08);
        color: white;
        font-size: 14px;
    }

    .modal-content input::placeholder {
        color: rgba(255, 255, 255, 0.5);
    }

    .modal-buttons {
        display: flex;
        justify-content: flex-end;
        gap: 10px;
        margin-top: 15px;
    }

    .btn-cancel {
        padding: 10px 18px;
        border-radius: 20px;
        border: none;
        background: rgba(255, 255, 255, 0.1);
        color: white;
        cursor: pointer;
    }

    .btn-create {
        padding: 10px 18px;
        border-radius: 20px;
        border: none;
        background: linear-gradient(135deg, #7b2ff7, #00c6ff);
        color: white;
        cursor: pointer;
    }

    .btn-danger {
        background: linear-gradient(135deg, #7b2ff7, #00c6ff);
        color: white;
        border-radius: 25px;
        padding: 10px 18px;
        border: none;
        cursor: pointer;
        font-weight: 500;
        transition: 0.3s;
    }

    /* 🔥 EFECTO HOVER (MUY IMPORTANTE) */
    .btn-danger:hover {
        transform: scale(1.05);
        opacity: 0.9;
    }

    .close {
        float: right;
        cursor: pointer;
    }


    /* TABLA PRO */

    .table-pro th {
        padding: 14px;
        font-size: 13px;
        opacity: 0.6;
    }

    .table-pro td {
        padding: 16px 12px;
        border-top: 1px solid rgba(255, 255, 255, 0.08);
    }



    /* STATUS */
    .status {
        padding: 5px 12px;
        border-radius: 12px;
        font-size: 12px;
        font-weight: 500;
    }


    .status.active {
        background: #00c851;
        color: white;
        padding: 6px 14px;
        border-radius: 20px;
        font-size: 12px;
    }


    /* HEADER PANEL */
    .panel-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
    }

    .panel-header p {
        opacity: 0.6;
        font-size: 14px;
    }

    /* CONTENEDOR TABLA */



    .table-container {
        background: rgba(255, 255, 255, 0.05);
        border-radius: 20px;
        padding: 15px;
        backdrop-filter: blur(10px);
    }

    /* TABLA */
    .table-pro {
        width: 100%;
        border-collapse: collapse;
    }

    .table-pro th {
        text-align: left;
        padding: 12px;
        font-size: 13px;
        opacity: 0.6;
    }

    .table-pro td {
        padding: 16px 12px;
        border-top: 1px solid rgba(255, 255, 255, 0.08);
    }


    /* CELDA USUARIO */
    .user-cell {
        display: flex;
        flex-direction: column;
    }

    .user-cell span {
        font-size: 12px;
        opacity: 0.6;
    }

    /* ACCIONES */
    .actions {
        display: flex;
        gap: 8px;
    }

    .action-btn {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        border: none;
        background: rgba(255, 255, 255, 0.1);
        color: white;
        cursor: pointer;
    }

    .action-btn.delete {
        background: linear-gradient(135deg, #7b2ff7, #00c6ff);
    }

    .badge {
        background: rgba(255, 255, 255, 0.1);
        padding: 5px 12px;
        border-radius: 12px;
        font-size: 12px;
    }


    /* MAPA */
    .map-container {
        margin-top: 20px;
        border-radius: 20px;
        overflow: hidden;
    }

    #map {
        width: 100%;
        height: 350px;
        border-radius: 20px;
    }

    /* TARJETA RUTA */
    .ruta-card {
        margin-top: 20px;
        background: rgba(255, 255, 255, 0.05);
        padding: 20px;
        border-radius: 20px;
    }

    /* HEADER RUTA */
    .ruta-header {
        display: flex;
        justify-content: space-between;
        margin-bottom: 10px;
    }

    /* ESTADOS */
    .estado {
        padding: 5px 12px;
        border-radius: 20px;
        font-size: 12px;
        margin-left: 10px;
    }

    .estado.activo {
        background: #00c851;
    }

    /* PROGRESO */
    .progress-bar {
        width: 100%;
        height: 6px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 10px;
        margin: 15px 0;
        overflow: hidden;
    }

    .progress {
        width: 70%;
        height: 100%;
        background: linear-gradient(135deg, #7b2ff7, #00c6ff);
        border-radius: 10px;
    }

    .progress {
        width: 60%;
        height: 100%;
        background: linear-gradient(135deg, #7b2ff7, #00c6ff);
        border-radius: 10px;
    }

    /* PARADAS */
    .ruta-card {
        margin-top: 20px;
        background: rgba(255, 255, 255, 0.05);
        padding: 20px;
        border-radius: 20px;
    }

    .paradas {
        display: flex;
        flex-direction: column;
        gap: 10px;
    }

    .parada {
        padding: 12px;
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.05);
        display: flex;
        justify-content: space-between;
    }

    /* ESTADOS PARADAS */
    .parada.entregado {
        background: rgba(0, 255, 150, 0.2);
    }

    .parada.proceso {
        background: rgba(0, 150, 255, 0.2);
    }

    .parada.pendiente {
        background: rgba(255, 255, 255, 0.05);
    }

    .hora {
        font-size: 13px;
        opacity: 0.7;
        margin-left: 5px;
        /* pequeño ajuste */
    }

    /* FOOTER */
    .ruta-footer {
        padding-right: 10px;
    }

    .ruta-actions {
        display: flex;
        gap: 12px;
        /* 🔥 separación entre botones */
    }

    .btn-map,
    .btn-create {
        padding: 10px 16px;
        /* 🔥 más espacio interno */
        border-radius: 20px;
    }

    .stock {
        background: rgba(255, 255, 255, 0.08);
        padding: 6px 14px;
        border-radius: 12px;
        font-weight: 500;
    }

    .status.normal {
        background: rgba(0, 255, 170, 0.15);
        color: #00ffa6;
    }

    .table tbody tr {
        transition: 0.3s;
    }

    .table tbody tr:hover {
        background: rgba(255, 255, 255, 0.05);
        transform: scale(1.01);
    }


    .btn-stock {
        display: inline-block;
        background: rgba(255, 255, 255, 0.1);
        padding: 6px 12px;
        border-radius: 12px;
    }

    .btn-stock:hover {
        background: linear-gradient(135deg, #7b2ff7, #00c6ff);
        transform: scale(1.05);
    }
</style>

<div class="topbar">

    <div class="left">
        🚚 <div>
            <strong>Smart Delivery</strong><br>
            <small>Panel de Administrador</small>
        </div>
    </div>

    <div class="right">
        <div class="user-info">
            Administrador Principal<br>
            <small>Admin</small>
        </div>

        <form method="POST" action="{% url 'logout' %}">
            {% csrf_token %}
            <button type="submit" class="btn-logout">
                ⎋ Cerrar sesión
            </button>
        </form>
    </div>

</div>

<div class="menu">
    <a onclick="loadSection('dashboard')">Dashboard</a>
    <a onclick="loadSection('empresas')">Empresas</a>
    <a onclick="loadSection('usuarios')">Usuarios</a>
    <a onclick="loadSection('pedidos')">Pedidos</a>
    <a onclick="loadSection('conductores')">Conductores</a>
    <a onclick="loadSection('rutas')">Rutas</a>
    <a onclick="loadSection('inventario')">Inventario</a>
    <a onclick="loadSection('incidencias')">Incidencias</a>
</div>

<div id="content-area">
    <div style="padding:40px; text-align:center; opacity:0.7;">
        Cargando módulo...
    </div>
</div>


<!-- 🔥 CHART.JS -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>

    function loadSection(section) {
        fetch(`/panel/${section}/`)
            .then(res => res.text())
            .then(html => {
                const content = document.getElementById('content-area');
                content.innerHTML = html;

                // Ejecutar scripts del contenido cargado
                content.querySelectorAll("script").forEach(oldScript => {
                    const newScript = document.createElement("script");
                    newScript.textContent = oldScript.textContent;
                    document.body.appendChild(newScript);
                });
            });
    }

    window.onload = () => loadSection('dashboard');


</script>

{% endblock %}
