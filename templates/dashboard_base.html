{% extends 'base.html' %}

{% block content %}

<style>
    .cards {
        display: grid !important;
        grid-template-columns: repeat(4, 1fr) !important;
        gap: 10px !important;
        margin-top: 10px;

    }

    .card {
        background: rgba(255, 255, 255, 0.1);
        padding: 20px;
        border-radius: 15px;
    }

    .number {
        font-size: 28px;
        font-weight: bold;
    }

   
    
    .card-conductores {
        background: rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(15px);
        border-radius: 20px;
        border: 1px solid rgba(255, 255, 255, 0.15);
    }

    .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    }

    .box {
        padding: 20px;
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.1);
    }

    .charts {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 25px;
        margin-top: 25px;
    }

    .chart-box {
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 15px;
        padding: 20px;
        backdrop-filter: blur(10px);
    }

    .chart-box h4 {
        margin-bottom: 15px;
        font-size: 15px;
        font-weight: 600;
    }

    .chart-box canvas {
        max-width: 250px;
        max-height: 250px;
        margin: auto;
    }

    .kpi {
        background: rgba(255, 255, 255, 0.2);
        padding: 10px;
        border-radius: 10px;
        margin: 10px 0;
    }

    table {
        width: 100%;
        margin-top: 20px;
        border-collapse: collapse;
    }

    td,
    th {
        padding: 10px;
    }

    body {
        background: radial-gradient(circle at 20% 20%, #7b2ff7, transparent 40%),
            radial-gradient(circle at 80% 30%, #00c6ff, transparent 40%),
            radial-gradient(circle at 50% 80%, #5f9cff, transparent 50%),
            #0f172a;

        min-height: 100vh;
        color: white;
    }

    .glass {
        background: rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(15px);
        -webkit-backdrop-filter: blur(15px);

        border-radius: 20px;
        border: 1px solid rgba(255, 255, 255, 0.2);

        box-shadow:
            0 8px 32px rgba(0, 0, 0, 0.2),
            inset 0 0 10px rgba(255, 255, 255, 0.1);
    }



    .menu {
        display: flex;
        gap: 10px;
        padding: 20px 40px;
    }

    .menu a {
        padding: 10px 20px;
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.1);
        cursor: pointer;
    }

    .menu a:hover {
        background: linear-gradient(135deg, #7b2ff7, #00c6ff);
    }

    #content-area {
        padding: 30px;
    }

    /* 🔥 HEADER PRO */
    .topbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 18px 40px;
        background: linear-gradient(90deg, #3b3f9c, #7b2ff7, #00c6ff);
        border-radius: 12px;
    }

    /* IZQUIERDA */
    .left {
        display: flex;
        align-items: center;
        gap: 12px;
    }

    /* ICONO (el emoji 🚚) */
    .left::before {
        content: "🚚";
        background: rgba(255, 255, 255, 0.15);
        padding: 10px;
        border-radius: 12px;
        font-size: 16px;
    }

    /* TEXTO */
    .left div {
        display: flex;
        flex-direction: column;
        justify-content: center;
    }

    /* TITULO */
    .left strong {
        font-size: 16px;
        font-weight: 600;
        line-height: 1.2;
    }

    /* SUBTITULO */
    .left small {
        font-size: 12px;
        opacity: 0.7;
    }

    /* DERECHA */
    .right {
        display: flex;
        align-items: center;
        gap: 15px;
    }

    /* USUARIO */
    .user-info {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        font-size: 13px;
        line-height: 1.2;
    }


    .right form {
        margin: 0;
        display: flex;
        align-items: center;
    }

    /* BOTÓN PRO */
    .btn-logout {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 6px 14px;
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.15);
        border: 1px solid rgba(255, 255, 255, 0.2);
        font-size: 13px;
    }

    /* HOVER */
    .btn-logout:hover {
        background: linear-gradient(135deg, #7b2ff7, #00c6ff);
    }


    .modal {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.6);
        justify-content: center;
        align-items: center;
        z-index: 1000;
    }

    .modal-content {
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(12px);
        padding: 25px;
        border-radius: 18px;
        width: 400px;
        color: white;
    }

    .modal-content input {
        width: 100%;
        padding: 10px;
        margin-top: 10px;
        border-radius: 10px;
        border: none;
        background: rgba(255, 255, 255, 0.08);
        color: white;
    }

    /* GRID */
    .grid-2 {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
    }
    

    .modal-content input,
    .modal-content select {
        width: 100%;
        margin: 10px 0;
        padding: 12px;
        border-radius: 12px;
        border: none;
        outline: none;
        background: rgba(255, 255, 255, 0.08);
        color: white;
        font-size: 14px;
    }

    .modal-content input::placeholder {
        color: rgba(255, 255, 255, 0.5);
    }

    .modal-buttons {
        display: flex;
        justify-content: flex-end;
        gap: 10px;
        margin-top: 15px;
    }

    .btn-cancel {
        padding: 10px 18px;
        border-radius: 20px;
        border: none;
        background: rgba(255, 255, 255, 0.1);
        color: white;
        cursor: pointer;
    }

    .btn-create,
    .btn-logout,
    .btn-danger {
        background: linear-gradient(135deg, #7b2ff7, #00c6ff);
        border: none;
        border-radius: 25px;
        padding: 10px 18px;
        color: white;

        box-shadow: 0 4px 20px rgba(123, 47, 247, 0.5);
        transition: 0.3s;
    }

    .btn-create:hover {
        transform: scale(1.05);
        box-shadow: 0 0 20px rgba(123, 47, 247, 0.8);
    }

    input {
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 12px;
        padding: 10px;
        color: white;
    }

    input::placeholder {
        color: rgba(255, 255, 255, 0.6);
    }


    /* 🔥 EFECTO HOVER (MUY IMPORTANTE) */
    .btn-danger:hover {
        transform: scale(1.05);
        opacity: 0.9;
    }

    input {
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 12px;
        padding: 10px;
        color: white;
    }

    input::placeholder {
        color: rgba(255, 255, 255, 0.6);
    }

    .box.success {
        background: linear-gradient(135deg, rgba(0, 255, 150, 0.3), rgba(0, 255, 150, 0.1));
    }

    .box.info {
        background: linear-gradient(135deg, rgba(0, 150, 255, 0.3), rgba(0, 150, 255, 0.1));
    }

    .box.purple {
        background: linear-gradient(135deg, rgba(160, 90, 255, 0.3), rgba(160, 90, 255, 0.1));
    }

    .close {
        float: right;
        cursor: pointer;
    }

    /* TABLA PRO */

    .table-pro th {
        padding: 14px;
        font-size: 13px;
        opacity: 0.6;
    }

    .table-pro td {
        padding: 16px 12px;
        border-top: 1px solid rgba(255, 255, 255, 0.08);
    }

    /* STATUS */
    .status {
        padding: 5px 12px;
        border-radius: 12px;
        font-size: 12px;
        font-weight: 500;
    }


    .status.active {
        background: #00c851;
        color: white;
        padding: 6px 14px;
        border-radius: 20px;
        font-size: 12px;
    }


    /* HEADER PANEL */
    .panel-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
    }

    .panel-header p {
        opacity: 0.6;
        font-size: 14px;
    }

    /* CONTENEDOR TABLA */

    .table-container {
        background: rgba(255, 255, 255, 0.05);
        border-radius: 20px;
        padding: 15px;
        backdrop-filter: blur(10px);
    }

    /* TABLA */
    .table-pro {
        width: 100%;
        border-collapse: collapse;
    }

    .table-pro th {
        text-align: left;
        padding: 12px;
        font-size: 13px;
        opacity: 0.6;
    }

    .table-pro td {
        padding: 16px 12px;
        border-top: 1px solid rgba(255, 255, 255, 0.08);
    }


    /* CELDA USUARIO */
    .user-cell {
        display: flex;
        flex-direction: column;
    }

    .user-cell span {
        font-size: 12px;
        opacity: 0.6;
    }

    /* ACCIONES */
    .actions {
        display: flex;
        gap: 8px;
    }

    .action-btn {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        border: none;
        background: rgba(255, 255, 255, 0.1);
        color: white;
        cursor: pointer;
    }

    .action-btn.delete {
        background: linear-gradient(135deg, #7b2ff7, #00c6ff);
    }

    .badge {
        background: rgba(255, 255, 255, 0.1);
        padding: 5px 12px;
        border-radius: 12px;
        font-size: 12px;
    }


    /* MAPA */
    .map-container {
        margin-top: 20px;
        border-radius: 20px;
        overflow: hidden;
    }

    #map {
        width: 100%;
        height: 350px;
        border-radius: 20px;
    }

    /* TARJETA RUTA */
    .ruta-card {
        margin-top: 20px;
        background: rgba(255, 255, 255, 0.05);
        padding: 20px;
        border-radius: 20px;
    }

    /* HEADER RUTA */
    .ruta-header {
        display: flex;
        justify-content: space-between;
        margin-bottom: 10px;
    }

    /* ESTADOS */
    .estado {
        padding: 5px 12px;
        border-radius: 20px;
        font-size: 12px;
        margin-left: 10px;
    }

    .estado.activo {
        background: #00c851;
    }

    /* PROGRESO */
    .progress-bar {
        width: 100%;
        height: 6px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 10px;
        margin: 15px 0;
        overflow: hidden;
    }

    .progress {
        width: 70%;
        height: 100%;
        background: linear-gradient(135deg, #7b2ff7, #00c6ff);
        border-radius: 10px;
    }

    .progress {
        width: 60%;
        height: 100%;
        background: linear-gradient(135deg, #7b2ff7, #00c6ff);
        border-radius: 10px;
    }

    /* PARADAS */
    .ruta-card {
        margin-top: 20px;
        background: rgba(255, 255, 255, 0.05);
        padding: 20px;
        border-radius: 20px;
    }

    .paradas {
        display: flex;
        flex-direction: column;
        gap: 10px;
    }

    .parada {
        padding: 12px;
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.05);
        display: flex;
        justify-content: space-between;
    }

    /* ESTADOS PARADAS */
    .parada.entregado {
        background: rgba(0, 255, 150, 0.2);
    }

    .parada.proceso {
        background: rgba(0, 150, 255, 0.2);
    }

    .parada.pendiente {
        background: rgba(255, 255, 255, 0.05);
    }

    .hora {
        font-size: 13px;
        opacity: 0.7;
        margin-left: 5px;
        /* pequeño ajuste */
    }

    /* FOOTER */
    .ruta-footer {
        padding-right: 10px;
    }

    .ruta-actions {
        display: flex;
        gap: 12px;
        /* 🔥 separación entre botones */
    }

    .btn-map,
    .btn-create {
        padding: 10px 16px;
        /* 🔥 más espacio interno */
        border-radius: 20px;
    }

    .stock {
        background: rgba(255, 255, 255, 0.08);
        padding: 6px 14px;
        border-radius: 12px;
        font-weight: 500;
    }

    .status.normal {
        background: rgba(0, 255, 170, 0.15);
        color: #00ffa6;
    }

    .table tbody tr {
        transition: 0.3s;
    }

    .table tbody tr:hover {
        background: rgba(255, 255, 255, 0.05);
        transform: scale(1.01);
    }


    .btn-stock {
        display: inline-block;
        background: rgba(255, 255, 255, 0.1);
        padding: 6px 12px;
        border-radius: 12px;
    }

    .btn-stock:hover {
        background: linear-gradient(135deg, #7b2ff7, #00c6ff);
        transform: scale(1.05);
    }

    /* HEADER */
    .box-header {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 10px;
    }

    .box-header h4 {
        margin: 0;
        font-size: 16px;
    }

    /* ICONO */
    .icon {
        background: rgba(255, 255, 255, 0.2);
        padding: 8px;
        border-radius: 50%;
    }

    /* LABEL */
    .label {
        font-size: 12px;
        color: #cbd5f5;
    }

    /* PRODUCTO */
    .product {
        font-weight: bold;
        margin-bottom: 10px;
    }

    /* DIVISOR */
    .divider {
        height: 1px;
        background: rgba(255, 255, 255, 0.1);
        margin: 10px 0;
    }

    /* MINI CARDS */
    .stats-mini {
        display: flex;
        gap: 10px;
    }

    .mini-card {
        flex: 1;
        background: rgba(255, 255, 255, 0.08);
        padding: 10px;
        border-radius: 10px;
    }

    .mini-card small {
        font-size: 11px;
        color: #cbd5f5;
    }

    .mini-card h3 {
        margin: 5px 0;
    }

    .mini-card span {
        font-size: 11px;
        color: #9ca3af;
    }

    .box:hover {
        transform: scale(1.02);
        transition: 0.3s;
    }

    .report-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-top: 30px;
        padding: 15px 20px;
        border-radius: 15px;
        background: rgba(255, 255, 255, 0.08);
    }

    .report-header h3 {
        margin: 0;
    }

    .report-header p {
        margin: 0;
        font-size: 13px;
        opacity: 0.7;
    }

    .btn-export {
        background: rgba(255, 255, 255, 0.15);
        border: none;
        padding: 10px 15px;
        border-radius: 20px;
        color: white;
        cursor: pointer;
    }

    .btn-export:hover {
        background: linear-gradient(135deg, #7b2ff7, #00c6ff);
    }

    /* MENOS VENDIDO */
    .box.danger {
        background: rgba(255, 80, 80, 0.2);
        border: 1px solid rgba(255, 80, 80, 0.4);
    }


    .grid-ventas {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
    }

    @media (max-width: 768px) {
        .grid-ventas {
            grid-template-columns: 1fr;
        }
    }

    /* 🎯 BASE CARD */

    .cards {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 20px;
        /* 🔥 espacio entre tarjetas */
        margin-bottom: 25px;
        /* 🔥 separación abajo */
    }

    .box {
        padding: 12px;
        border-radius: 14px;
        min-height: 110px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        transition: 0.3s;
        backdrop-filter: blur(10px);
    }

    /* 🟢 VERDE */
    .box.success {
        background: linear-gradient(135deg, rgba(0, 255, 150, 0.25), rgba(0, 255, 150, 0.1));
        border: 1px solid rgba(0, 255, 150, 0.4);
    }

    /* 🔴 ROJO */
    .box.danger {
        background: linear-gradient(135deg, rgba(255, 80, 80, 0.25), rgba(255, 80, 80, 0.1));
        border: 1px solid rgba(255, 80, 80, 0.4);
    }

    /* 🔵 AZUL */
    .box.info {
        background: linear-gradient(135deg, rgba(0, 150, 255, 0.25), rgba(0, 150, 255, 0.1));
        border: 1px solid rgba(0, 150, 255, 0.4);
    }

    /* 🟣 MORADO */
    .box.purple {
        background: linear-gradient(135deg, rgba(160, 90, 255, 0.25), rgba(160, 90, 255, 0.1));
        border: 1px solid rgba(160, 90, 255, 0.4);
    }

    .icon {
        padding: 6px;
        border-radius: 50%;
        font-size: 12px;
    }

    @media (max-width: 768px) {
        .cards {
            grid-template-columns: 1fr 1fr;
            /* 2 columnas */
        }
    }

    @media (max-width: 768px) {
        .charts {
            grid-template-columns: 1fr;
            /* una debajo de otra */
        }
    }

    @media (max-width: 768px) {
        .table-container {
            overflow-x: auto;
        }
    }

    @media (max-width: 768px) {
        .topbar {
            flex-direction: column;
            align-items: flex-start;
            gap: 10px;
        }

        .right {
            width: 100%;
            justify-content: space-between;
        }
    }

    @media (max-width: 768px) {
        .menu {
            flex-wrap: wrap;
            gap: 8px;
        }

        .menu a {
            padding: 8px 12px;
            font-size: 13px;
        }
    }
</style>

<div class="topbar">

    <div class="left">
        <h2>Smart Delivery</h2>

    </div>

    <div class="right">
        <div class="user-info">
            Administrador Principal<br>
            <small>Admin</small>
        </div>

        <form method="POST" action="{% url 'logout' %}">
            {% csrf_token %}
            <button type="submit" class="btn-logout">
                ⎋ Cerrar sesión
            </button>
        </form>
    </div>

</div>

<div class="menu">
    <a onclick="loadSection('dashboard')">Dashboard</a>
    <a onclick="loadSection('empresas')">Empresas</a>
    <a onclick="loadSection('usuarios')">Usuarios</a>
    <a onclick="loadSection('pedidos')">Pedidos</a>
    <a onclick="loadSection('conductores')">Conductores</a>
    <a onclick="loadSection('rutas')">Rutas</a>
    <a onclick="loadSection('inventario')">Inventario</a>
    <a onclick="loadSection('incidencias')">Incidencias</a>
</div>

<div id="content-area">
    <div style="padding:40px; text-align:center; opacity:0.7;">
        Cargando módulo...
    </div>
</div>


<!-- 🔥 CHART.JS -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>

    function loadSection(section) {
        fetch(`/panel/${section}/`)
            .then(res => res.text())
            .then(html => {
                const content = document.getElementById('content-area');
                content.innerHTML = html;

                // Ejecutar scripts del contenido cargado
                content.querySelectorAll("script").forEach(oldScript => {
                    const newScript = document.createElement("script");
                    newScript.textContent = oldScript.textContent;
                    document.body.appendChild(newScript);
                });
            });
    }

    window.onload = () => loadSection('dashboard');


</script>

{% endblock %}
