<div class="header-empresas">
    <div>
        <h2>Gestión de Empresas</h2>
        <p>Administra las empresas que pueden usar el sistema</p>
    </div>

    <button class="btn-new" onclick="openModal()">
        + Nueva Empresa
    </button>
</div>

<div id="modalEmpresa" class="modal">
    <div class="modal-content">

        <span class="close" onclick="closeModal()">&times;</span>

        <h3>Crear Nueva Empresa</h3>
        <p>Ingresa el nombre de la empresa y genera un código único</p>

        <input type="text" id="nombreEmpresa" placeholder="Ej: Transportes Colombia">

        <div class="codigo-box">
            <input type="text" id="codigoEmpresa" placeholder="Ej: EMP001">
            <button onclick="generarCodigo()">Generar</button>
        </div>

        <div class="modal-actions">
            <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
            <button class="btn-create" onclick="crearEmpresa()">Crear Empresa</button>
        </div>

    </div>
</div>
</div>
