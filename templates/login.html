{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Smart Delivery - Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            height: 100vh;
            background: 
                linear-gradient(rgba(12,25,68,0.85), rgba(12,25,68,0.85)),
                url("{% static 'img/truck.jpg' %}") no-repeat center center/cover;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            width: 420px;
            padding: 40px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.2);
            text-align: center;
            color: white;
            box-shadow: 0 0 40px rgba(0,0,0,0.4);
        }

        .logo-icon {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #7b2ff7, #00c6ff);
            border-radius: 20px;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
        }

        h1 {
            margin-bottom: 10px;
            font-weight: 600;
        }

        .subtitle {
            font-size: 14px;
            opacity: 0.8;
            margin-bottom: 25px;
        }

        .form-group {
            text-align: left;
            margin-bottom: 15px;
        }

        .form-group label {
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            margin-top: 5px;
            background: rgba(255,255,255,0.15);
            color: white;
            outline: none;
        }

        .form-group input::placeholder {
            color: rgba(255,255,255,0.7);
        }

        .btn-primary {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: none;
            margin-top: 15px;
            background: linear-gradient(135deg, #7b2ff7, #00c6ff);
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
        }

        .register {
            margin-top: 15px;
            font-size: 14px;
        }

        .register a {
            color: #00c6ff;
            text-decoration: none;
        }

        .divider {
            margin: 20px 0;
            font-size: 12px;
            opacity: 0.7;
        }

        .social-buttons {
            display: flex;
            gap: 10px;
        }

        .social-buttons button {
            flex: 1;
            padding: 10px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            background: rgba(255,255,255,0.1);
            color: white;
        }

        .terms {
            margin-top: 20px;
            font-size: 12px;
            opacity: 0.6;
        }

        .terms a {
            color: #00c6ff;
            text-decoration: none;
        }
    </style>
</head>
<body>

<div class="login-card">

    <div class="logo-icon">🚚</div>

    <h1>Smart Delivery</h1>
    <div class="subtitle">Inicia sesión para continuar</div>

    <form method="POST">
        {% csrf_token %}

        <div class="form-group">
            <label>Correo electrónico o teléfono</label>
            <input type="text" name="username" placeholder="ejemplo@correo.com">
        </div>

        <div class="form-group">
            <label>Contraseña</label>
            <input type="password" name="password" placeholder="••••••••">
        </div>

        <button class="btn-primary" type="submit">Continuar</button>
    </form>

    <div class="register">
        ¿No tienes cuenta? <a href="#">Regístrate</a>
    </div>

    <div class="divider">O CONTINÚA CON</div>

    <div class="social-buttons">
        <button>G</button>
        <button>🪟</button>
        <button></button>
    </div>

    <div class="terms">
        Al continuar, aceptas nuestros 
        <a href="#">Términos de uso</a> y 
        <a href="#">Política de privacidad</a>
    </div>

</div>

</body>
</html>
