{% extends "base.html" %}

{% block title %}Login{% endblock %}
{% block body_class %}auth-body{% endblock %}

{% block content %}
<div class="auth-card">

    <div class="logo-icon">🚚</div>

    <h1>Smart Delivery</h1>
    <div class="subtitle">Inicia sesión para continuar</div>

    <form method="POST">
        {% csrf_token %}

        <div class="form-group">
            <label>Correo electrónico o teléfono</label>
            <input type="text" name="username">
        </div>

        <div class="form-group">
            <label>Contraseña</label>
            <input type="password" name="password">
        </div>

        <button class="btn-primary" type="submit">Continuar</button>
    </form>

    <div class="link-text">
        ¿No tienes cuenta? <a href="{% url 'register' %}">Regístrate</a>
    </div>

</div>
{% endblock %}
