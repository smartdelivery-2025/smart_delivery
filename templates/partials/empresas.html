<h2>Gestión de Empresas</h2>

<button onclick="crearEmpresa()">+ Nueva Empresa</button>

<ul id="empresas"></ul>

<script>
function cargarEmpresas(){
    fetch('/api/empresas/')
    .then(res=>res.json())
    .then(data=>{
        let html='';
        data.forEach(e=>{
            html += `
                <li>
                    ${e.name} (${e.code})
                    <button onclick="eliminarEmpresa(${e.id})">❌</button>
                </li>`;
        });
        document.getElementById('empresas').innerHTML = html;
    });
}

function crearEmpresa(){
    fetch('/api/empresas/create/', {method:'POST'})
    .then(()=>cargarEmpresas());
}

function eliminarEmpresa(id){
    fetch(`/api/empresas/delete/${id}/`, {method:'POST'})
    .then(()=>cargarEmpresas());
}

cargarEmpresas();
</script>
