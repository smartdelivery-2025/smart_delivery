{% load static %}
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Smart Delivery - Crear Cuenta</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            min-height: 100vh;
            background:
                linear-gradient(rgba(12, 25, 68, 0.85), rgba(12, 25, 68, 0.85)),
                url("{% static 'img/truck.jpg' %}") no-repeat center center/cover;

            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        html {
            overflow-y: auto;
        }

        .register-card {
            width: 420px;
            padding: 40px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.2);
            text-align: center;
            color: white;
            box-shadow: 0 0 40px rgba(0,0,0,0.4);
        }

        .logo-icon {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #7b2ff7, #00c6ff);
            border-radius: 20px;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
        }

        h1 {
            margin-bottom: 10px;
            font-weight: 600;
        }

        .subtitle {
            font-size: 14px;
            opacity: 0.8;
            margin-bottom: 25px;
        }

        .form-group {
            text-align: left;
            margin-bottom: 15px;
        }

        .form-group label {
            font-size: 14px;
            display: block;
            margin-bottom: 5px;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            background: rgba(255, 255, 255, 0.15);
            color: white;
            outline: none;
        }

        .form-group input::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }

        .btn-primary {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: none;
            margin-top: 15px;
            background: linear-gradient(135deg, #7b2ff7, #00c6ff);
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
        }

        .login-link {
            margin-top: 15px;
            font-size: 14px;
        }

        .login-link a {
            color: #00c6ff;
            text-decoration: none;
        }

        .note {
            margin-top: 20px;
            font-size: 12px;
            opacity: 0.6;
        }
    </style>
</head>

<body>

<div class="register-card">

    <div class="logo-icon">🚚</div>

    <h1>Crear Cuenta</h1>
    <div class="subtitle">Únete a Smart Delivery</div>

    <form method="POST">
        {% csrf_token %}

        <div class="form-group">
            <label>Código de empresa</label>
            <input type="text" name="company_code" placeholder="Ej: SMART001" required>
        </div>

        <div class="form-group">
            <label>Nombre completo</label>
            <input type="text" name="username" placeholder="Juan Pérez" required>
        </div>

        <div class="form-group">
            <label>Correo electrónico</label>
            <input type="email" name="email" placeholder="tu@email.com" required>
        </div>

        <div class="form-group">
            <label>Teléfono</label>
            <input type="text" name="phone" placeholder="+52 123 456 7890" required>
        </div>

        <div class="form-group">
            <label>Contraseña</label>
            <input type="password" name="password1" placeholder="Mínimo 6 caracteres" required>
        </div>

        <div class="form-group">
            <label>Confirmar contraseña</label>
            <input type="password" name="password2" placeholder="Repite tu contraseña" required>
        </div>

        <button class="btn-primary" type="submit">Crear cuenta</button>
    </form>

    <div class="login-link">
        ¿Ya tienes cuenta? <a href="{% url 'login' %}">Inicia sesión</a>
    </div>

    <div class="note">
        Solo clientes pueden registrarse.<br>
        Los conductores son creados por el administrador.
    </div>

</div>

</body>
</html>
